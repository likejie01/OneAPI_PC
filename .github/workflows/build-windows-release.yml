name: Build Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.9. Defaults to package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneAPI-PC-Windows
          path: |
            release/*.exe
            release/*.zip
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -eq "main" -or $tag -eq "master") {
            $version = node -p "require('./package.json').version"
            $tag = "v$version"
          }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "OneAPI PC $tag" --notes "Windows desktop release for OneAPI PC."
          }

          gh release upload $tag release/*.exe release/*.zip release/latest.yml release/*.blockmap --clobber
