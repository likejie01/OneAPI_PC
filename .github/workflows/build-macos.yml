name: Build macOS Client

on:
  workflow_dispatch:
  push:
    tags:
      - 'pc-mac-v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERTIFICATE_P12_BASE64 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN_NAME=build-signing.keychain-db
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-keychain-password}"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          rm -f certificate.p12

      - name: Build macOS DMG and ZIP
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64}" ]]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run build:mac

      - name: Notarize DMG
        if: ${{ env.MACOS_CERTIFICATE_P12_BASE64 != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          set -euo pipefail
          for dmg in release/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: oneapi-pc-macos
          path: |
            release/*.dmg
            release/*.zip
